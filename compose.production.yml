name: visual-compiler

x-service-defaults: &service-defaults
  image: visual-compiler:${IMAGE_TAG:-local}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=1g,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 30s

services:
  demo:
    <<: *service-defaults
    command: ["npm", "run", "start:demo"]
    environment:
      NODE_ENV: production
      DEMO_HOST: 0.0.0.0
      DEMO_PORT: "4173"
    expose:
      - "4173"
    networks:
      - app-internal
      - traefik
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4173/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.visual-compiler-demo.rule: "Host(`${DEMO_DOMAIN:?Set DEMO_DOMAIN in .env.production}`)"
      traefik.http.routers.visual-compiler-demo.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.visual-compiler-demo.tls: "true"
      traefik.http.routers.visual-compiler-demo.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      traefik.http.routers.visual-compiler-demo.service: "visual-compiler-demo"
      traefik.http.services.visual-compiler-demo.loadbalancer.server.port: "4173"

  studio:
    <<: *service-defaults
    command: ["npm", "run", "start:studio"]
    shm_size: "1gb"
    depends_on:
      demo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STUDIO_HOST: 0.0.0.0
      STUDIO_PORT: "3000"
      DEMO_SITE_INTERNAL_URL: "http://demo:4173"
      DEMO_SITE_PUBLIC_URL: "https://${DEMO_DOMAIN:?Set DEMO_DOMAIN in .env.production}"
      WORKFLOW_STORAGE_DIR: /app/compiled-workflows
      USE_LIVE_OPENAI: "${USE_LIVE_OPENAI:-false}"
      OPENAI_COMPILE_MODEL: "${OPENAI_COMPILE_MODEL:-gpt-5.6}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    expose:
      - "3000"
    volumes:
      - workflows:/app/compiled-workflows
    networks:
      - app-internal
      - traefik
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.visual-compiler-studio.rule: "Host(`${STUDIO_DOMAIN:?Set STUDIO_DOMAIN in .env.production}`)"
      traefik.http.routers.visual-compiler-studio.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.visual-compiler-studio.tls: "true"
      traefik.http.routers.visual-compiler-studio.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      traefik.http.routers.visual-compiler-studio.middlewares: "${TRAEFIK_STUDIO_MIDDLEWARES:?Set TRAEFIK_STUDIO_MIDDLEWARES to an existing authentication or IP-allowlist middleware}"
      traefik.http.routers.visual-compiler-studio.service: "visual-compiler-studio"
      traefik.http.services.visual-compiler-studio.loadbalancer.server.port: "3000"

networks:
  app-internal:
    internal: true
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"

volumes:
  workflows:
    name: "${WORKFLOW_VOLUME_NAME:-visual-compiler-workflows}"
